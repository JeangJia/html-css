<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武汉传媒学院账号注册</title>
    <link rel="stylesheet" href="1.css">
</head>

<body>
    <div class="header">
        <img src="banner3.jpg" alt="武汉传媒学院 banner">
    </div>
    <div class="form-wrapper">
        <form>
            <h3 class="title">您的账号信息:</h3>
            <table>
                <tr>
                    <td>注册方式:</td>
                    <td>
                        <input type="radio" name="register" id="email">
                        <label for="email">E-mail注册</label>
                        &nbsp;&nbsp;
                        <input type="radio" name="register" id="phone">
                        <label for="phone">手机号码注册</label>
                    </td>
                </tr>
                <tr>
                    <td>注册邮箱:</td>
                    <td><input type="text" name="email"></td>
                </tr>
                <tr>
                    <td>注册手机:</td>
                    <td><input type="text" name="phone"></td>
                </tr>
                <tr>
                    <td>登陆密码:</td>
                    <td><input type="password" name="password"></td>
                </tr>
            </table>

            <h3 class="title">您的个人信息:</h3>
            <table>
                <tr>
                    <td>性别:</td>
                    <td>
                        <input type="radio" name="gender" id="male">
                        <label for="male">男</label>
                        &nbsp;&nbsp;
                        <input type="radio" name="gender" id="female">
                        <label for="female">女</label>
                    </td>
                </tr>
                <tr>
                    <td>所在城市:</td>
                    <td>
                        <select name="city">
                            <option value="beijing">北京</option>
                            <option value="shanghai">上海</option>
                            <option value="wuhan">武汉</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>兴趣爱好:</td>
                    <td>
                        <input type="checkbox" name="hobby" id="football">
                        <label for="football">足球</label>
                        &nbsp;
                        <input type="checkbox" name="hobby" id="basketball">
                        <label for="basketball">篮球</label>
                        &nbsp;
                        <input type="checkbox" name="hobby" id="swimming">
                        <label for="swimming">游泳</label>
                        &nbsp;
                        <input type="checkbox" name="hobby" id="singing">
                        <label for="singing">唱歌</label>
                        &nbsp;
                        <input type="checkbox" name="hobby" id="running">
                        <label for="running">跑步</label>
                    </td>
                </tr>
                <tr>
                    <td>自我介绍:</td>
                    <td>
                        <textarea name="intro" placeholder="评论的时候,请遵纪守法并注意语言文明,多给文档分享人一些支持."></textarea>
                    </td>
                </tr>
            </table>
        </form>
    </div>
    <div class="footer">
        Copyright © 2025 传媒技术com, All rights reserved.
    </div>
</body>

</html>
