<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机移动支付业务问卷调查</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e0e0;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
        }
        .survey-container {
            background-color: #fff;
            padding: 30px;
            width: 600px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #ff9900;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .divider {
            height: 2px;
            background-color: #ff9900;
            margin-bottom: 20px;
        }
        .question {
            margin-bottom: 15px;
        }
        .options {
            margin-left: 20px;
        }
        .options label {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 8px;
        }
        .checkbox-options label {
            display: block;
            margin-bottom: 8px;
        }
        .info-section {
            margin-top: 20px;
        }
       
        .info-section input {
            width: 100px;
            outline: none;
            border: none;
            border-bottom: 1px solid #000;
            padding: 5px;
            margin-right: 15px;
        }
        .submit-btn {
            text-align: center;
            margin-top: 20px;
        }
        .submit-btn button {
            background-color: #ff9900;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        input:hover{
            bottom: none;
        }
    </style>
</head>
<body>
    <div class="survey-container">
        <h2>手机移动支付业务问卷调查</h2>
        <div class="divider"></div>
        <div class="question">
            1. 您的教育程度是?
            <div class="options">
                <label><input type="radio" name="education"> 高中</label>
                <label><input type="radio" name="education"> 大专</label>
                <label><input type="radio" name="education"> 本科</label>
                <label><input type="radio" name="education"> 硕士研究生</label>
                <label><input type="radio" name="education"> 博士及以上</label>
            </div>
        </div>
        <div class="question">
            2. 您的年龄段是?
            <div class="options">
                <label><input type="radio" name="age"> 18岁以下</label>
                <label><input type="radio" name="age"> 18-25岁</label>
                <label><input type="radio" name="age"> 26-30岁</label>
                <label><input type="radio" name="age"> 31-35岁</label>
                <label><input type="radio" name="age"> 35岁以上</label>
            </div>
        </div>
        <div class="question">
            3. 您是否使用过手机移动支付业务?
            <div class="options">
                <label><input type="radio" name="use"> 从未听说过</label>
                <label><input type="radio" name="use"> 听说过,但未使用过</label>
                <label><input type="radio" name="use"> 偶尔使用</label>
                <label><input type="radio" name="use"> 经常使用</label>
            </div>
        </div>
        <div class="question">
            4. 您了解以下哪些手机移动支付业务?(可多选)
            <div class="options">
                <label><input type="checkbox" name="business"> 支付宝</label>
                <label><input type="checkbox" name="business"> 微信支付</label>
                <label><input type="checkbox" name="business"> 电信翼支付</label>
                <label><input type="checkbox" name="business"> Apple Pay</label>
                <label><input type="checkbox" name="business"> 以上均不了解</label>
            </div>
        </div>
        <div class="question">
            5. 您看重以下哪些支付功能?(可多选)
            <div class="options checkbox-options">
                <label><input type="checkbox" name="function"> 话费/游戏币充值</label>
                <label><input type="checkbox" name="function"> 刷手机加油</label>
                <label><input type="checkbox" name="function"> 刷手机购物</label>
                <label><input type="checkbox" name="function"> 刷手机乘坐公交/轻轨/地铁</label>
                <label><input type="checkbox" name="function"> 水电煤/有线电视/宽带远程缴费</label>
                <label><input type="checkbox" name="function"> 享受联盟商户的优惠折扣</label>
                <label><input type="checkbox" name="function"> 以上均不感兴趣</label>
            </div>
        </div>
        <div class="info-section">
            您的姓名 <input type="text">
            您的职业 <input type="text">
            联系电话 <input type="text">
        </div>
        <div class="submit-btn">
            <button>提交问卷</button>
        </div>
    </div>
</body>
</html>
