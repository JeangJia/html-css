<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机移动支付业务问卷调查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
            padding: 20px 0;
        }
        
        .bg {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        h2 {
            font-size: 28px;
            color: rgb(253, 155, 26);
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .hr {
            height: 2px;
            background-color: rgb(253, 155, 26);
            margin: 15px 0 30px;
        }
        
        .question {
            margin-bottom: 30px;
        }
        
        .question p {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
            font-weight: 500;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px 25px;
            margin-left: 10px;
        }
        
        .option {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .option:hover {
            color: rgb(253, 155, 26);
        }
        
        .option input {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            accent-color: rgb(253, 155, 26);
        }
        
        .user-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
            justify-content: center;
        }
        
        .user-item {
            display: flex;
            align-items: center;
        }
        
        .user-item span {
            margin-right: 10px;
            color: #555;
        }
        
        .user-item input {
            padding: 8px 12px;
            border: none;
            border-bottom: 1px solid #ccc;
            transition: border-color 0.3s;
            font-size: 16px;
            width: 180px;
        }
        
        .user-item input:focus {
            outline: none;
            border-color: rgb(253, 155, 26);
        }
        
        .button-container {
            text-align: center;
            margin-top: 40px;
        }
        
        button {
            width: 150px;
            height: 45px;
            background-color: rgb(253, 155, 26);
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background-color: #e69a1a;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(253, 155, 26, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .bg {
                width: 95%;
                padding: 20px 15px;
            }
            
            h2 {
                font-size: 24px;
            }
            
            .options {
                flex-direction: column;
                gap: 10px;
            }
            
            .user-info {
                flex-direction: column;
                align-items: center;
            }
            
            .user-item {
                width: 100%;
                max-width: 300px;
            }
            
            .user-item input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="bg">
        <h2>手机移动支付业务问卷调查</h2>
        <div class="hr"></div>
        
        <div class="question">
            <p>1. 您的教育程度是?</p>
            <div class="options">
                <label class="option"><input type="radio" name="education">高中</label>
                <label class="option"><input type="radio" name="education">大专</label>
                <label class="option"><input type="radio" name="education">本科</label>
                <label class="option"><input type="radio" name="education">硕士研究生</label>
                <label class="option"><input type="radio" name="education">博士及以上</label>
            </div>
        </div>
        
        <div class="question">
            <p>2. 您的年龄段是?</p>
            <div class="options">
                <label class="option"><input type="radio" name="age">18岁以下</label>
                <label class="option"><input type="radio" name="age">18~25岁</label>
                <label class="option"><input type="radio" name="age">26~30岁</label>
                <label class="option"><input type="radio" name="age">31~35岁</label>
                <label class="option"><input type="radio" name="age">35岁以上</label>
            </div>
        </div>
        
        <div class="question">
            <p>3. 您是否使用过手机移动支付业务?</p>
            <div class="options">
                <label class="option"><input type="radio" name="experience">从未听说过</label>
                <label class="option"><input type="radio" name="experience">听说过,但未使用</label>
                <label class="option"><input type="radio" name="experience">偶尔使用</label>
                <label class="option"><input type="radio" name="experience">经常使用</label>
            </div>
        </div>
        
        <div class="question">
            <p>4. 您了解以下哪些手机移动支付业务?(可多选)</p>
            <div class="options">
                <label class="option"><input type="checkbox" name="services">支付宝</label>
                <label class="option"><input type="checkbox" name="services">微信支付</label>
                <label class="option"><input type="checkbox" name="services">银联云闪付</label>
                <label class="option"><input type="checkbox" name="services">Apple Pay</label>
                <label class="option"><input type="checkbox" name="services">华为Pay</label>
                <label class="option"><input type="checkbox" name="services">其他</label>
            </div>
        </div>
        
        <div class="question">
            <p>5. 您看重以下哪些支付功能?(可多选)</p>
            <div class="options">
                <label class="option"><input type="checkbox" name="features">快捷支付</label>
                <label class="option"><input type="checkbox" name="features">安全性高</label>
                <label class="option"><input type="checkbox" name="features">优惠活动多</label>
                <label class="option"><input type="checkbox" name="features">跨境支付</label>
                <label class="option"><input type="checkbox" name="features">账单管理</label>
                <label class="option"><input type="checkbox" name="features">积分奖励</label>
            </div>
        </div>
        
        <div class="user-info">
            <div class="user-item">
                <span>您的姓名</span>
                <input type="text" placeholder="请输入姓名">
            </div>
            <div class="user-item">
                <span>联系电话</span>
                <input type="tel" placeholder="请输入电话">
            </div>
            <div class="user-item">
                <span>所在城市</span>
                <input type="text" placeholder="请输入城市">
            </div>
        </div>
        
        <div class="button-container">
            <button type="button">提交问卷</button>
        </div>
    </div>
</body>
</html>
