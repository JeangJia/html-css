<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择表单</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }
    .bg {
        margin: 0 auto;
        width: 1000px;

    }
    div {
        box-sizing: border-box;
    }
    h2 {
        font-size: 28px;
        color: rgb(253, 155, 26);
        text-align: center;
        font-weight: 700;
    }
    p {
        margin-top: 20px;
        margin-left: 50px;
    }
    .hr {
        height: 2px;
        background-color: rgb(253, 155, 26);
        margin-top: 10px;
        margin-bottom: 10px;
    }
    input{
        margin-top: 8px;
        margin-left: 70px;
    }
    .user {
        float: left;
    }
    .user span {
        margin-left: 20px;
    }
    .user input {
        margin-left: 10px;
        border:0px 0px 1px 0px;
        border-bottom: 1px solid #000;
        border-top: 0px solid #fff;
        border-left: 0px solid #fff;
        border-right: 0px solid #fff;
    }
    .bu {
        margin-top: 20px;
    }
    button {
        width: 120px;
        height: 40px;
        /* margin: 20px auto; */
        background-color: rgb(253, 155, 26);
        color: #fff;
        line-height: 40px;
        /* text-align: center; */
        border: none;
    }

</style>
<body>
    <div class="bg">
    <h2>手机移动支付业务问卷调查</h2>
    <div class="hr"></div>
    <p>1. 您的教育程度是?</p>
    <input type="radio" name="jiaoyu">高中
    <input type="radio" name="jiaoyu">大专
    <input type="radio" name="jiaoyu">本科
    <input type="radio" name="jiaoyu">硕士研究生
    <input type="radio" name="jiaoyu">博士及以上
    <p>2. 您的年龄段是?</p>
    <input type="radio" name="sui">18岁以下
    <input type="radio" name="sui">18~25岁
    <input type="radio" name="sui">26~30岁
    <input type="radio" name="sui">31~35岁
    <input type="radio" name="sui">35岁以上
    <p>3. 您是否使用过手机移动支付业务?</p>
    <input type="radio" name="ts">从未听说过
    <input type="radio" name="ts">听说过,但未使用
    <input type="radio" name="ts">偶尔使用
    <input type="radio" name="ts">经常使用
    <p>4. 您了解以下哪些手机移动支付业务?(可多选)</p>
    <input type="checkbox" name="fs">高中
    <input type="checkbox" name="fs">大专
    <input type="checkbox" name="fs">本科
    <input type="checkbox" name="fs">硕士研究生
    <input type="checkbox" name="fs">博士及以上
    <p>4. 您看重以下哪些支付功能?(可多选)</p>
    <input type="checkbox" name="jiaoyu">高中<br>
    <input type="checkbox" name="jiaoyu">大专<br>
    <input type="checkbox" name="jiaoyu">本科<br>
    <input type="checkbox" name="jiaoyu">硕士研究生<br>
    <input type="checkbox" name="jiaoyu">博士及以上<br>

    <div class="user"><span>您的姓名</span><input type="text"></div>
    <div class="user"><span>您的姓名</span><input type="text"></div>
    <div class="user"><span>您的姓名</span><input type="text"></div>  
    <div class="bu"><center><button>提交问卷</button></center></div> 

    </div>
</body>
</html>
