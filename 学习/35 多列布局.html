<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 80%;
            margin: 30px auto;
            border: 1px solid #000;
            /* 控制列数 */
            column-count: 2;
            /* 每列之间距离 */
            column-gap: 30px;
            /* 每列之间添加分割线 */
            column-rule: 1px solid #00aeec;
        }

        .item {
            height: 200px;
            margin-bottom: 10px;
            border: 1px solid #000;
            /* 不允许盒子被切割 */
            break-inside: avoid-column;
        }
        .item3{
            height: 400px;
        }
        .item4{
            height: 150px;
        }
        .item5{
            height: 400px;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item item3">3</div>
        <div class="item item4">4</div>
        <div class="item item5">5</div>
    </div>
</body>

</html>
