<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* .box{
            margin: 100px auto;
            border: 1px solid #000;
            height: 400px;
        } */
        .box {
            margin: 0 auto;
            width: 80%;
            /* border: 1px solid #000; */
            display: flex;
            justify-content: space-around;
            /* gap: 100px; */

        }

        .item {
            flex: 1;
            width: 300px;
            height: 150px;
            border-radius: 10px;
            margin: 10px;
            background-color: pink;
            flex: 1;
        }

        .item1 {
            flex: 3;
        }

        .inp {
            border: 1px solid #000;
            margin: 0 auto;
            width: 400px;
            height: 30px;
            display: flex;
        }

        input {
            flex: 10;
            border: 0px;
            padding-left: 20px;
            outline: none;
        }

        span {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            /* border: 1px solid #000; */
        }
    </style>
</head>

<body>
    <div class="inp">
        <input type="text">
        <span>O</span>
    </div>
    <div class="box">
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>

</body>

</html>
