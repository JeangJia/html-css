<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .box{
            margin: 100px auto;
            width: 80%;
            height: 400px;
            border: 3px solid #000;
        }
        li{
            list-style: none;
            background-color: #00AEEC;
            border: 1px solid #fff;
        }
        .box{
            display: grid;
            /* 
                grid-template-columns/rows
                    用于来显示布局包含多少列/行 表示一共有多少参数来排列,一份参数占比多少(fr为grid专属分配单位)
                    可以简写为 repeat(重复多少次/auto-fit/auto-fill,数值) auto-fill会保留空轨道
                gap:行间距,列间距
            */
            /* 
                grid-template-columns: minmax(150px,1fr) 1fr 1fr 1fr; 
                grid-template-rows: repeat(auto-fit,minmax(150px,1fr));
             */
            grid-template-columns: repeat(auto-fit,minmax(100px,1fr));
            gap: 1fr;
        }
    </style>
</head>
<body>
    <ul class="box">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
</body>
</html>
