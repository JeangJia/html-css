<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body,
        html {
            background-color: #171921;
        }

        @keyframes rotate {
            to {
                transform: rotate(360deg);
            }
        }

        .box {
            position: relative;
            margin: 200px auto;
            width: 300px;
            height: 200px;
            border-radius: 6px;
            background-color: #171921;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .box::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 6px;
            background-image: conic-gradient(transparent, transparent, transparent, #00aeec);
            animation: rotate 1s linear infinite;
        }

        .item {
            position: absolute;
            /* top: 5;
            right: 5;
            bottom: 5;
            left: 5; */
            /* 简写为 inset */
            inset: 5px;
            border-radius: 6px;
            background-color: #fff;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="item">content</div>
    </div>
</body>

</html>
