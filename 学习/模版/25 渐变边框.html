<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body,
        html {
            background-color: #171921;
        }

        @keyframes move {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .box {
            position: relative;
            margin: 100px auto;
            width: 170px;
            height: 70px;
            overflow: hidden;
            border-radius: 6px;
            padding: 4px;
        }

        /* 渐变流光层 */
        .box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(115deg, #4fcf70, #fad648, #a767e5, #12bcfe, #4fcf70);
            animation: move .5s linear infinite alternate;
        }

        .box .item {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: black;
            border-radius: 6px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="item">start</div>
    </div>
</body>

</html>
