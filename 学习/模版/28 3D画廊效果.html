<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 画廊</title>
<style>
  * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    list-style: none;
  }
  body ,html{
    background-color: #171921;
  }

  body {
    padding-top: 100px;
  }

  .box {
    display: flex;
    width: max-content;
    margin: 0 auto;
    perspective: 1500px;
  }

  .item {
    width: 160px;
    height: 220px;
    margin: 0 3px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    transition: all 0.5s ease;
    /* 倒影 */
    -webkit-box-reflect: below 2px linear-gradient(transparent, rgba(0,0,0,0.2));
  }

  /* 图片路径 */
  .item:nth-child(1) { background-image: url(./images/1.avif); }
  .item:nth-child(2) { background-image: url(./images/2.avif); }
  .item:nth-child(3) { background-image: url(./images/3.avif); }
  .item:nth-child(4) { background-image: url(./images/4.avif); }
  .item:nth-child(5) { background-image: url(./images/5.avif); }

  .item:hover {
    transform: scale(1.4);
    z-index: 10;
  }

  /* 左边的图:向里转 */
  .box:hover .item:not(:hover) {
    transform: rotateY(40deg);
    margin: 0 -12px;
  }

  /* 右边的图:反向转 */
  .box .item:hover ~ .item {
    transform: rotateY(-40deg);
    margin: 0 -12px;
  }
</style>
</head>
<body>
  <ul class="box">
    <li class="item"></li>
    <li class="item"></li>
    <li class="item"></li>
    <li class="item"></li>
    <li class="item"></li>
  </ul>
</body>
</html>
