<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        margin: 100px auto;
        width: 200px;
        height: 200px;
        position: relative;
        perspective: 500px;
        transform-style: preserve-3d;
        transition: all 0.5s linear;
        /* 这个属性是实现3D翻转效果的关键,它可以隐藏元素的背面. */
        backface-visibility: hidden;
    }

    .box:hover {
        transform: rotateY(180deg);
    }

    .front,
    .back {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        text-align: center;
        line-height: 200px;
        font-size: 20px;
    }

    .front {
        background-color: pink;
        z-index: 1;
    }

    .back {
        background-color: purple;
        transform: rotateY(180deg);
    }
</style>

<body>
    <div class="box">
        <div class="front">
            正面
        </div>
        <div class="back">
            反面
        </div>
    </div>

</body>

</html>
