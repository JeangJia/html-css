<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        li{
            list-style: none;
        }
        .box{
            width: 70%;
            margin: 100px auto;
            /* border: 1px solid #000; */
            height: 240px;
            position: relative;
        }
        ul{
            display: flex;
            gap: 10px;
            overflow: hidden;
            /* 水平滚动条 */
            overflow-x: scroll;
            /* 平滑滚动 */
            scroll-behavior: smooth;
            /* 隐藏滚动条 */
            scrollbar-width: none;
        }
        ul::after,ul::before{
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 100px;
            border-radius: 50%;
            background-color: #fff;
        }
        ul::before{
            bottom: -52px;
        }
        ul::after{
            top: -52px;
        }
        ul li{
            height: 240px;
            /* width: 200px; */
            /* 不拉伸 不伸缩 初始值为200px */
            flex: 0 0 200px;
        }
        ul li div{
            height: 100%;
            width: 100%;
        }
        ul li:nth-child(odd) div{
            background-color: #00AEEC;
        }
        ul li:nth-child(even) div{
            background-color: #FB7299;
        }

    </style>
</head>
<body>
    <div class="box">
        <ul>
            <li><div class="item1"></div></li>
            <li><div class="item2"></div></li>
            <li><div class="item3"></div></li>
            <li><div class="item4"></div></li>
            <li><div class="item5"></div></li>
            <li><div class="item6"></div></li>
            <li><div class="item7"></div></li>
            <li><div class="item8"></div></li>
            <li><div class="item9"></div></li>
            <li><div class="item10"></div></li>
        </ul>

    </div>
    <script>
        const scroll = document.querySelector('.box ul')
        scroll.addEventListener('wheel', (e) => {
            e.preventDefault()      
            scroll.scrollLeft += e.deltaY * 1.5  
        })
    </script>
</body>
</html>
