<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        li{
            list-style: none;
        }
        .box{
            width: 70%;
            margin: 100px auto;
            /* border: 1px solid #000; */
            height: 240px;
            position: relative;
        }
        ul{
            display: flex;
            gap: 10px;
            overflow: hidden;
            /* 水平滚动条 */
            overflow-x: scroll;
            /* 平滑滚动 */
            scroll-behavior: smooth;
            /* 隐藏滚动条 */
            scrollbar-width: none;
        }
        ul::after,ul::before{
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 100px;
            border-radius: 50%;
            background-color: #fff;
        }
        ul::before{
            bottom: -48px;
        }
        ul::after{
            top: -48px;
        }
        ul li{
            height: 240px;
            /* width: 200px; */
            /* 不拉伸 不伸缩 初始值为200px */
            flex: 0 0 200px;
        }
        ul li div{
            height: 100%;
            width: 100%;
        }
        ul li:nth-child(odd) div{
            background-color: #00AEEC;
        }
        ul li:nth-child(even) div{
            background-color: #FB7299;
        }
        ul li img{
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    </style>
</head>
<body>
    <div class="box">
        <ul>
            <li><div class="item1"><img src="https://images.unsplash.com/photo-1778939012313-b8b5c2d64713?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw5fHx8ZW58MHx8fHx8" alt=""></div></li>
            <li><div class="item2"><img src="https://images.pexels.com/photos/36965524/pexels-photo-36965524.jpeg" alt=""></div></li>
            <li><div class="item3"><img src="https://images.unsplash.com/photo-1776193550369-3f9c6077b205?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw2Nnx8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
            <li><div class="item4"><img src="https://images.unsplash.com/photo-1779799881667-f364258b4614?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw5Mnx8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
            <li><div class="item5"><img src="https://plus.unsplash.com/premium_photo-1755882941145-ef16b408695b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4OXx8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
            <li><div class="item6"><img src="https://images.unsplash.com/photo-1779087750252-2525cb2576a8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4M3x8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
            <li><div class="item7"><img src="https://images.unsplash.com/photo-1778084765801-a53bc6dc5f96?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw3MXx8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
            <li><div class="item8"><img src="https://plus.unsplash.com/premium_photo-1727285730766-1334539b1547?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw3Nnx8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
            <li><div class="item9"><img src="https://images.unsplash.com/photo-1778159242389-00f28329cc16?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw3NXx8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
            <li><div class="item10"><img src="https://plus.unsplash.com/premium_photo-1712935547661-4fe0b2de98bf?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw2N3x8fGVufDB8fHx8fA%3D%3D" alt=""></div></li>
        </ul>

    </div>
    <script>
        const scroll = document.querySelector('.box ul')
        scroll.addEventListener('wheel', (e) => {
            e.preventDefault()      
            scroll.scrollLeft += e.deltaY * 1.5  
        })
    </script>
</body>
</html>
