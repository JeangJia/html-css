<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
        }

        body,
        html {
            background-color: #181D27;
            color: #fff;
        }

        .box {
            width: 200px;
            margin: 60px auto;
        }

        .title {
            width: 200px;
            height: 40px;
            line-height: 40px;
            border: 1px solid #fff;
            background-color: #fff;
            padding-left: 10px;
            color: #00aeec;
        }

        .nav li {
            height: 40px;
            width: 200px;
            line-height: 40px;
            padding-left: 10px;
            background-color: #fff;
            color: #181D27;
            cursor: pointer;
            transform: translateX(-200px);
            opacity: 0;
            /* 只对需要动画的属性设置过渡 */
            transition: transform .2s ease calc(var(--i)*0.1s),
                        opacity .2s ease calc(var(--i)*0.1s);
        }

        .title:hover+.nav li {
            transform: translateX(0);
            opacity: 1;
        }

        /* 当li:hover 时,li 也显示 */
        .nav:has(li:hover) li {
            transform: translateX(0);
            opacity: 1;
        }

        .nav li:hover {
            background-color: #00aeec;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="box">
        <h4 class="title">菜单</h4>
        <ul class="nav">
            <li style="--i:0;">首页</li>
            <li style="--i:1;">关于我们</li>
            <li style="--i:2;">联系我们</li>
            <li style="--i:3;">服务项目</li>
            <li style="--i:4;">客户案例</li>
        </ul>
    </div>
</body>

</html>
