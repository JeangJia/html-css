<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./icofont/iconfont.css">
    <style>
        :root {
            --bgc: #171921;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background-color: var(--bgc);
        }

        .box {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 100px auto;
            /* border: 1px solid #000; */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box span {
            position: absolute;
        }

        .btn {
            width: 68px;
            height: 68px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 3px solid #fff;
            color: #fff;
            background-color: var(--bgc);
            transition: all .8s;
            z-index: 999;
        }

        .box:hover .btn {
            transform: rotate(315deg);
        }

        .btn~span {
            color: var(--col);
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 2px solid var(--col);
            opacity: 0;
            transition: all .4s calc(var(--i)*.05s);
        }

        .btn~span:hover {
            /* 鼠标悬停时,不进行过渡动画 */
            transition: all 0s;
            /* 阴影效果 */
            box-shadow: 0 0 10px var(--col), 0 0 20px var(--col), 0 0 30px var(--col), 0 0 40px var(--col);
            background-color: var(--col);
            color: #fff;
        }

        .box:hover .btn~span {
            opacity: 1;
            transform: rotate(calc(360deg/8*var(--i))) translateX(80px);
        }

        /* 图标反向旋转 */
        .btn~span i {
            transform: rotate(calc(-360deg/8*var(--i)));
        }
    </style>
</head>

<body>
    <div class="box">

        <span style="--i:0;--col:#3B82F6;"><i class="iconfont icon-liwu"></i></span>
