<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body {
            perspective: 1000px;
        }

        body,
        html {
            background-color: #171921;
        }

        section {
            position: relative;
            width: 300px;
            height: 200px;
            margin: 150px auto;
            transform-style: preserve-3d;
            animation: rotate 10s linear infinite;
        }

        section:hover {
            /* 鼠标放入section 停止动画 */
            animation-play-state: paused;
        }

        @keyframes rotate {
            0% {
                transform: rotateY(0);
            }

            100% {
                transform: rotateY(360deg);
            }
        }

        section div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        section div:nth-child(1) {
            transform: rotateY(0) translateZ(300px);
            background-image: url(../资料/01-CSS3进阶-2D3D动画/源码以及素材/media/dog.jpg);
        }

        section div:nth-child(2) {
            transform: rotateY(60deg) translateZ(300px);
            background-image: url(../资料/01-CSS3进阶-2D3D动画/源码以及素材/media/pig.jpg);
        }

        section div:nth-child(3) {
            transform: rotateY(120deg) translateZ(300px);
            background-image: url(../资料/01-CSS3进阶-2D3D动画/源码以及素材/media/pic.jpg);
        }

        section div:nth-child(4) {
            transform: rotateY(180deg) translateZ(300px);
            background-image: url(../资料/01-CSS3进阶-2D3D动画/源码以及素材/media/scale.jpg);
        }

        section div:nth-child(5) {
            transform: rotateY(240deg) translateZ(300px);
            background-image: url(../资料/01-CSS3进阶-2D3D动画/源码以及素材/media/bg1.png);
        }

        section div:nth-child(6) {
            transform: rotateY(300deg) translateZ(300px);
            background-image: url(../资料/01-CSS3进阶-2D3D动画/源码以及素材/media/bg2.png);
        }
    </style>
</head>

<body>
    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </section>
</body>

</html>
