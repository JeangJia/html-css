<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding-top: 100px;
            padding-bottom: 100px;
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 0 600;
            }

            100% {
                stroke-dasharray: 600 0;
            }
        }

        @keyframes move {
            0% {
                stroke-dashoffset: 2830;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        svg {
            width: 62px;
            height: 62px;
            /* 填充图标颜色 fill */
            fill: none;
            /* 描边颜色 stroke */
            stroke: #00aeec;
            /* 描边宽度 stroke-width */
            stroke-width: 2px;
            /* 虚线模式 stroke-dasharray: 实线长度 间隔长度 */
            stroke-dasharray: 10 0;
        }

        svg:hover {
            animation: dash 2s;
        }

        .love {
            stroke: #ff0000;
            stroke-width: 5px;
            stroke-dasharray: 2830;
            /* 虚线起始偏移量 stroke-dashoffset: 虚线长度 */
            /* 需要结合 stroke-dasharray 使用才能实现虚线动画 */
            stroke-dashoffset: 2830;
        }

        .love {
            animation: move 2s linear infinite;
        }
    </style>
</head>
