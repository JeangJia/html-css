<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 通过 :root 定义全局变量 */
        :root {
            --color: #00aeec;
            --gap: 10px;
        }

        .box {
            width: 800px;
            height: 400px;
            margin: 0 auto;
            /* 通过 var() 引用全局变量 */
            border: 1px solid var(--color);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--gap);
        }

        .item {
            /* 通过 calc() 计算宽度 */
            width: calc(33% - var(--gap));
            /* margin: var(--gap); */
            background-color: #ccc;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
</body>

</html>
